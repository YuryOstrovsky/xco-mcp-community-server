name: lint-test

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install flake8
      # Error subset only: syntax errors + undefined names. The tree is not
      # bulk-style-linted yet, so this gates real bugs without thousands of
      # legacy nits. Widen the select set as the codebase is cleaned up.
      - name: flake8 (errors)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
            --exclude=.venv,generated,logs,openapi,smoke-test,docs

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      # Offline unit tests only (catalog/registry/version/normalizer/HTTP).
      # The smoke-test/ batches need a live XCO + running server and are NOT
      # run here — they are the manual release gate.
      - name: Run unit tests
        run: pytest -q

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t xco-mcp:ci .
